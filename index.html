<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa – Santo Domingo Norte</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #111827;
            height: 100%;
            width: 100%;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        svg {
            width: 90vw;
            max-width: 1200px;
            height: auto;
            background: #0f172a;
        }
        .bordes-municipio {
            fill: #e5e7eb;
            stroke: #111827;
            stroke-width: 3;
        }
        .sector {
            stroke: #111827;
            stroke-width: 2;
            fill-opacity: 0.85;
            cursor: pointer;
            transition: fill-opacity .15s ease, stroke-width .15s ease;
        }
        .sector:hover {
            fill-opacity: 1;
            stroke-width: 3;
        }
        .label {
            font-size: 14px;
            font-weight: 700;
            fill: #111827;
            text-anchor: middle;
            paint-order: stroke;
            stroke: #f9fafb;
            stroke-width: 4;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="wrapper">

    <!--
      Mapa estilizado aproximado de Santo Domingo Norte
      viewBox: sistema de coordenadas propio (0–1000 x 0–800 aprox).
      La silueta general está inspirada en la imagen que enviaste.
    -->
    <svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">

        <!-- Silueta general del municipio (una sola pieza) -->
        <path
            id="sdn-borde"
            class="bordes-municipio"
            d="
                M 180 760
                L 120 620
                Q 90 520 80 460
                Q 60 360 80 290
                Q 120 170 210 110
                Q 330 40 500 40
                Q 670 40 790 110
                Q 890 170 930 260
                Q 970 340 980 430
                Q 990 520 960 610
                Q 930 700 870 760
                L 700 780
                L 520 790
                L 340 780
                Z
            "
        />

        <!-- =====================
             SECTORES INTERNOS
             ===================== -->
        <!-- Para que TODO quede dentro del municipio, cada sector
             se ha dibujado pegando sus bordes al path exterior.  -->

        <!-- LOS GUARICANOS (suroeste) -->
        <path
            id="sector-guaricanos"
            class="sector"
            data-nombre="Los Guaricanos"
            fill="#3b82f6"
            d="
                M 180 760
                L 120 620
                Q 90 520 80 460
                Q 80 420 90 380
                Q 200 360 320 360
                L 320 620
                L 340 780
                L 260 770
                Z
            "
        />

        <!-- VILLA MELLA (centro-sur) -->
        <path
            id="sector-villa-mella"
            class="sector"
            data-nombre="Villa Mella"
            fill="#22c55e"
            d="
                M 320 360
                L 500 360
                L 650 360
                L 650 620
                L 520 780
                L 340 780
                L 320 620
                Z
            "
        />

        <!-- SABANA PERDIDA (sureste) -->
        <path
            id="sector-sabana-perdida"
            class="sector"
            data-nombre="Sabana Perdida"
            fill="#ef4444"
            d="
                M 650 360
                Q 760 360 850 370
                Q 900 390 930 420
                Q 940 470 930 520
                Q 910 610 870 760
                L 700 780
                L 520 780
                L 650 620
                Z
            "
        />

        <!-- LA VICTORIA (norte) -->
        <path
            id="sector-la-victoria"
            class="sector"
            data-nombre="La Victoria"
            fill="#a855f7"
            d="
                M 90 380
                Q 140 250 230 190
                Q 340 120 500 110
                Q 660 120 770 190
                Q 860 240 910 320
                Q 930 350 930 420
                Q 900 390 850 370
                Q 760 360 650 360
                L 500 360
                L 320 360
                Q 200 360 90 380
                Z
            "
        />

        <!-- =====================
             TEXTOS DE SECTORES
             ===================== -->
        <text class="label" x="250" y="520">Los Guaricanos</text>
        <text class="label" x="470" y="540">Villa Mella</text>
        <text class="label" x="760" y="560">Sabana Perdida</text>
        <text class="label" x="500" y="270">La Victoria</text>

    </svg>
</div>
</body>
</html>
